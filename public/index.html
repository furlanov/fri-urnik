<!doctype html>
<html lang="sl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#0b8f78">
    <title>Urnik</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/styles.css">
    <script src="/theme-init.js"></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <span class="brand-name">FRI urnik<span class="brand-week" id="brandWeek"></span></span>
        <span class="brand-context" id="programContext"></span>
      </div>

      <div class="week-nav" aria-label="Week navigation">
        <button class="nav-button" id="previousWeek" type="button" aria-label="Previous week">&#8249;</button>
        <button class="nav-today" id="currentWeek" type="button">Danes</button>
        <button class="nav-button" id="nextWeek" type="button" aria-label="Next week">&#8250;</button>
      </div>

      <div class="header-right">
        <span class="week-range" id="weekTitle">&nbsp;</span>
        <button class="settings-button" id="openSettings" type="button" aria-controls="settingsPanel" aria-expanded="false" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm7.94-2.34.02-.33-.02-.33 2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7.43 7.43 0 0 0-1.14-.66l-.36-2.54a.5.5 0 0 0-.5-.43h-3.84a.5.5 0 0 0-.5.43l-.36 2.54c-.4.17-.78.4-1.14.66l-2.39-.96a.5.5 0 0 0-.61.22L2.41 10.28a.5.5 0 0 0 .12.64L4.56 12.5l-.02.33.02.33-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96c.36.26.74.49 1.14.66l.36 2.54c.05.25.26.43.5.43h3.84c.24 0 .45-.18.5-.43l.36-2.54c.4-.17.78-.4 1.14-.66l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58Z"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="grid-container" aria-label="Timetable">
        <div class="grid-scroll">
          <div class="timetable" id="timetable"></div>
        </div>
        <div class="mobile-schedule" id="mobileSchedule"></div>
        <div class="empty-state" id="emptyState" hidden>
          Za izbrane filtre ni terminov.
        </div>
      </section>
    </main>

    <div class="settings-backdrop" id="settingsBackdrop" hidden></div>
    <aside class="settings-panel" id="settingsPanel" aria-label="Settings" aria-hidden="true" hidden>
      <div class="settings-header">
        <div>
          <h2>Nastavitve</h2>
        </div>
        <button class="icon-button" id="closeSettings" type="button" aria-label="Close settings">&times;</button>
      </div>

      <div class="field">
        <span>Tema</span>
        <div class="theme-switch" id="themeSwitch" role="radiogroup" aria-label="Izbira teme">
          <button type="button" data-theme-value="light" role="radio" aria-checked="false">White</button>
	  <button type="button" data-theme-value="dark" role="radio" aria-checked="false">Dark</button>
        </div>
      </div>

      <label class="field">
        <span>Povezava do urnika</span>
        <input id="sourceUrlInput" type="url" autocomplete="off" spellcheck="false" placeholder="https://urnik.fri.uni-lj.si/timetable/.../allocations?group=63372">
      </label>

      <div class="source-actions">
        <button class="settings-action primary" id="saveSourceUrl" type="button">Shrani</button>
        <button class="settings-action" id="refreshImport" type="button">Osveži zdaj</button>
        <button class="settings-action export-action" id="exportIcs" type="button">Izvozi .ics</button>
      </div>
      <p class="import-status" id="importStatus">Urnik se sinhronizira enkrat dnevno.</p>

      <div class="filter-actions" aria-label="Filter shortcuts">
        <button class="settings-action" id="showAll" type="button">Vsi</button>
        <button class="settings-action" id="hideAll" type="button">Brez</button>
        <button class="settings-action" id="lecturesOnly" type="button">Predavanja</button>
        <button class="settings-action" id="labsOnly" type="button">Vaje</button>
      </div>

      <label class="field">
        <span>Iskanje predmeta</span>
        <input id="filterSearch" type="search" autocomplete="off" placeholder="Ime predmeta">
      </label>

      <div class="filter-list" id="filterList"></div>
    </aside>
  </body>
</html>
